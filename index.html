<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数控铣工理论考试练习系统</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f0f2f5; color: #333; }

/* 顶部导航 */
.header {
  background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
  color: white;
  padding: 0 20px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 { font-size: 18px; font-weight: 600; }
.header-btns { display: flex; gap: 10px; align-items: center; }
.header-btns span { font-size: 14px; opacity: 0.9; }
.btn {
  padding: 7px 18px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.2s;
}
.btn-white { background: white; color: #1a73e8; }
.btn-white:hover { background: #e8f0fe; }
.btn-danger { background: #f44336; color: white; }
.btn-danger:hover { background: #d32f2f; }
.btn-success { background: #4caf50; color: white; }
.btn-success:hover { background: #388e3c; }

/* 主布局 */
.main-layout {
  display: flex;
  height: calc(100vh - 56px);
  overflow: hidden;
}

/* 左侧题号面板 */
.sidebar {
  width: 200px;
  background: white;
  border-right: 1px solid #e0e0e0;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.sidebar-header {
  padding: 12px 16px;
  background: #f5f5f5;
  border-bottom: 1px solid #e0e0e0;
  font-size: 13px;
  font-weight: 600;
  color: #555;
}
.sidebar-legend {
  padding: 8px 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  border-bottom: 1px solid #e0e0e0;
  background: #fafafa;
}
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #666; }
.legend-dot {
  width: 12px; height: 12px; border-radius: 50%;
  display: inline-block;
}
.legend-dot.unanswered { background: #e0e0e0; }
.legend-dot.answered { background: #1a73e8; }
.legend-dot.correct { background: #4caf50; }
.legend-dot.wrong { background: #f44336; }

.num-grid {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  align-content: flex-start;
}
.num-btn {
  width: 34px;
  height: 34px;
  border: 1px solid #ddd;
  border-radius: 4px;
  background: #f5f5f5;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 500;
  color: #555;
  position: relative;
}
.num-btn:hover { border-color: #1a73e8; color: #1a73e8; }
.num-btn.active { border-color: #1a73e8; background: #1a73e8; color: white; }
.num-btn.answered { background: #1a73e8; color: white; border-color: #1a73e8; }
.num-btn.correct { background: #4caf50; color: white; border-color: #4caf50; }
.num-btn.wrong { background: #f44336; color: white; border-color: #f44336; }
.num-btn .mark-dot {
  position: absolute;
  top: 2px; right: 2px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #ff9800;
}

/* 答题区 */
.content-area {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}
.question-card {
  background: white;
  border-radius: 8px;
  padding: 28px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  max-width: 820px;
  margin: 0 auto;
}
.q-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 16px;
}
.q-type-badge {
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  flex-shrink: 0;
  margin-top: 2px;
}
.badge-single { background: #e3f2fd; color: #1565c0; }
.badge-judge { background: #fce4ec; color: #c62828; }
.q-num { font-size: 13px; color: #999; margin-bottom: 4px; }
.q-text { font-size: 16px; line-height: 1.7; color: #222; flex: 1; margin-right: 12px; }

/* 选项 */
.options { margin-top: 18px; display: flex; flex-direction: column; gap: 10px; }
.option-item {
  display: flex;
  align-items: flex-start;
  padding: 12px 16px;
  border: 2px solid #e0e0e0;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  gap: 12px;
}
.option-item:hover { border-color: #1a73e8; background: #f8faff; }
.option-item.selected { border-color: #1a73e8; background: #e8f0fe; }
.option-item.selected .opt-key { background: #1a73e8; color: white; }
.option-item.correct-ans { border-color: #4caf50; background: #e8f5e9; }
.option-item.correct-ans .opt-key { background: #4caf50; color: white; }
.option-item.wrong-ans { border-color: #f44336; background: #ffebee; }
.option-item.wrong-ans .opt-key { background: #f44336; color: white; }
.opt-key {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: #f0f0f0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  flex-shrink: 0;
  color: #555;
}
.opt-text { font-size: 15px; line-height: 1.6; padding-top: 2px; }

/* 判断题 */
.judge-options { display: flex; gap: 16px; margin-top: 18px; }
.judge-btn {
  flex: 1;
  padding: 14px;
  border: 2px solid #e0e0e0;
  border-radius: 8px;
  cursor: pointer;
  text-align: center;
  font-size: 15px;
  font-weight: 500;
  transition: all 0.2s;
  background: white;
}
.judge-btn:hover { border-color: #1a73e8; background: #f8faff; }
.judge-btn.selected { border-color: #1a73e8; background: #e8f0fe; color: #1a73e8; }
.judge-btn.correct-ans { border-color: #4caf50; background: #e8f5e9; color: #2e7d32; }
.judge-btn.wrong-ans { border-color: #f44336; background: #ffebee; color: #c62828; }

/* 答案解析区 */
.answer-review {
  margin-top: 20px;
  padding: 16px;
  border-radius: 8px;
  background: #f9f9f9;
  border-left: 4px solid #4caf50;
  display: none;
}
.answer-review.show { display: block; }
.answer-review h4 { font-size: 14px; color: #555; margin-bottom: 6px; }
.my-answer { font-size: 15px; margin-bottom: 4px; }
.std-answer { font-size: 15px; color: #2e7d32; font-weight: 600; }
.answer-icon { font-size: 20px; margin-bottom: 4px; }

/* 导航按钮 */
.nav-btns {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px solid #eee;
}
.btn-nav {
  padding: 8px 24px;
  border: 2px solid #1a73e8;
  border-radius: 6px;
  background: white;
  color: #1a73e8;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-nav:hover { background: #1a73e8; color: white; }
.btn-nav:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-nav:disabled:hover { background: white; color: #1a73e8; }
.q-progress { font-size: 13px; color: #999; }

/* 进度条 */
.progress-bar-wrap {
  background: #e0e0e0;
  border-radius: 4px;
  height: 4px;
  margin: 12px 16px 6px;
  overflow: hidden;
}
.progress-bar-inner {
  height: 100%;
  background: #1a73e8;
  transition: width 0.3s;
}
.progress-text {
  text-align: center;
  font-size: 11px;
  color: #999;
  padding-bottom: 4px;
}

/* 成绩弹窗 */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: white;
  border-radius: 12px;
  padding: 36px;
  max-width: 480px;
  width: 90%;
  text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  animation: slideIn 0.3s ease;
}
@keyframes slideIn {
  from { transform: translateY(-30px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.score-circle {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  margin: 0 auto 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  font-weight: 700;
  border: 6px solid;
}
.score-circle.pass { border-color: #4caf50; color: #2e7d32; background: #e8f5e9; }
.score-circle.fail { border-color: #f44336; color: #c62828; background: #ffebee; }
.score-label { font-size: 13px; font-weight: 400; margin-top: 2px; }
.modal h2 { font-size: 20px; margin-bottom: 12px; }
.score-details {
  display: flex;
  gap: 16px;
  margin: 16px 0 24px;
  justify-content: center;
}
.score-detail-item {
  background: #f5f5f5;
  border-radius: 8px;
  padding: 10px 20px;
  text-align: center;
}
.score-detail-item .num { font-size: 22px; font-weight: 700; }
.score-detail-item .label { font-size: 12px; color: #888; margin-top: 2px; }
.correct-num { color: #4caf50; }
.wrong-num { color: #f44336; }
.unanswered-num { color: #ff9800; }
.modal-btns { display: flex; gap: 12px; justify-content: center; }
.btn-restart {
  padding: 10px 28px;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  background: #1a73e8;
  color: white;
}
.btn-restart:hover { background: #1557b0; }
.btn-review {
  padding: 10px 28px;
  border: 2px solid #1a73e8;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  background: white;
  color: #1a73e8;
}
.btn-review:hover { background: #e8f0fe; }

/* 开始界面 */
.start-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  background: #f0f2f5;
}
.start-card {
  background: white;
  border-radius: 12px;
  padding: 48px 56px;
  text-align: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  max-width: 500px;
  width: 90%;
}
.start-icon { font-size: 64px; margin-bottom: 16px; }
.start-card h2 { font-size: 24px; color: #1a73e8; margin-bottom: 8px; }
.start-card p { color: #666; font-size: 15px; margin-bottom: 8px; }
.start-info {
  background: #f5f9ff;
  border-radius: 8px;
  padding: 16px;
  margin: 20px 0;
  text-align: left;
}
.start-info p { font-size: 14px; color: #555; margin-bottom: 6px; }
.start-info p:last-child { margin-bottom: 0; }
.btn-start {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #1a73e8, #0d47a1);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
}
.btn-start:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(26,115,232,0.4); }

/* 隐藏 */
.hidden { display: none !important; }

/* 标记按钮 */
.mark-btn {
  padding: 5px 12px;
  border: 1.5px solid #ff9800;
  border-radius: 4px;
  background: white;
  color: #ff9800;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
}
.mark-btn.marked { background: #ff9800; color: white; }
.mark-btn:hover { background: #ff9800; color: white; }

/* 手机端浮动题号按钮 */
.mobile-nav-btn {
  display: none;
  position: fixed;
  bottom: 80px;
  right: 16px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: #1a73e8;
  color: white;
  border: none;
  font-size: 22px;
  cursor: pointer;
  box-shadow: 0 3px 12px rgba(26,115,232,0.5);
  z-index: 150;
  align-items: center;
  justify-content: center;
}
/* 手机端题号抽屉遮罩 */
.drawer-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 160;
}
.drawer-overlay.show { display: block; }
/* 手机端题号抽屉 */
.sidebar-drawer {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  max-height: 60vh;
  background: white;
  border-radius: 16px 16px 0 0;
  z-index: 170;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
}
.sidebar-drawer.show { display: flex; }
.drawer-handle {
  width: 40px; height: 4px;
  background: #ddd; border-radius: 2px;
  margin: 12px auto 8px;
}

/* 响应式 */
@media (max-width: 768px) {
  /* 隐藏桌面侧边栏 */
  .sidebar { display: none !important; }
  .content-area { padding: 12px; }
  .question-card { padding: 16px; }
  .q-text { font-size: 15px; }
  .opt-text { font-size: 14px; }

  /* 顶部标题缩短 */
  .header h1 { font-size: 15px; }

  /* 显示浮动按钮 */
  .mobile-nav-btn { display: flex; }

  /* 导航按钮适配 */
  .nav-btns { margin-top: 20px; }
  .btn-nav { padding: 8px 16px; font-size: 13px; }

  /* 成绩弹窗适配 */
  .modal { padding: 24px 20px; }
  .score-details { gap: 8px; }
  .score-detail-item { padding: 8px 12px; }

  /* 开始页适配 */
  .start-card { padding: 32px 24px; }
}
</style>

<body>

<!-- 开始界面 -->
<div id="startScreen" class="start-screen">
  <div class="start-card">
    <div class="start-icon">📋</div>
    <h2>数控铣工理论考试</h2>
    <p>职业技能鉴定理论知识考核</p>
    <div class="start-info">
      <p>📌 <strong>题型：</strong>单项选择题（80题）+ 判断题（20题）</p>
      <p>📌 <strong>分值：</strong>每题1分，满分100分</p>
      <p>📌 <strong>合格线：</strong>60分</p>
      <p>📌 <strong>特点：</strong>每次启动题目顺序随机打乱</p>
    </div>
    <button class="btn-start" onclick="startExam()">🚀 开始答题</button>
  </div>
</div>

<!-- 考试界面 -->
<div id="examScreen" class="hidden">
  <!-- 顶部 -->
  <div class="header">
    <h1>数控铣工理论考试</h1>
    <div class="header-btns">
      <span id="headerProgress">已答 0/100</span>
      <button class="btn btn-white" onclick="showStartScreen()">重新开始</button>
      <button class="btn btn-danger" onclick="confirmSubmit()">提交考试</button>
    </div>
  </div>

  <div class="main-layout">
    <!-- 左侧题号 -->
    <div class="sidebar">
      <div class="sidebar-header">题目导航</div>
      <div class="sidebar-legend">
        <div class="legend-item"><span class="legend-dot unanswered"></span>未答</div>
        <div class="legend-item"><span class="legend-dot answered"></span>已答</div>
        <div class="legend-item"><span class="legend-dot correct"></span>正确</div>
        <div class="legend-item"><span class="legend-dot wrong"></span>错误</div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-inner" id="progressBar" style="width:0%"></div>
      </div>
      <div class="progress-text" id="progressText">0 / 100</div>
      <div class="num-grid" id="numGrid"></div>
    </div>

    <!-- 答题区 -->
    <div class="content-area" id="contentArea">
      <div class="question-card" id="questionCard"></div>
    </div>
  </div>
</div>

<!-- 手机端浮动题号按钮（只在考试时显示） -->
<button class="mobile-nav-btn hidden" id="mobileNavBtn" onclick="openDrawer()" title="题目导航">☰</button>

<!-- 手机端题号抽屉遮罩 -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

<!-- 手机端题号抽屉 -->
<div class="sidebar-drawer" id="sidebarDrawer">
  <div class="drawer-handle" onclick="closeDrawer()"></div>
  <div class="sidebar-header" style="padding:8px 16px 10px;display:flex;justify-content:space-between;align-items:center;">
    <span>题目导航</span>
    <button onclick="closeDrawer()" style="border:none;background:none;font-size:20px;cursor:pointer;color:#999;">×</button>
  </div>
  <div class="sidebar-legend" style="padding:6px 12px;">
    <div class="legend-item"><span class="legend-dot unanswered"></span>未答</div>
    <div class="legend-item"><span class="legend-dot answered"></span>已答</div>
    <div class="legend-item"><span class="legend-dot correct"></span>正确</div>
    <div class="legend-item"><span class="legend-dot wrong"></span>错误</div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-inner" id="drawerProgressBar" style="width:0%"></div>
  </div>
  <div class="progress-text" id="drawerProgressText">0 / 100</div>
  <div class="num-grid" id="drawerNumGrid" style="max-height:40vh;overflow-y:auto;padding:10px;"></div>
</div>

<!-- 成绩弹窗 -->
<div class="modal-overlay" id="resultModal">
  <div class="modal">
    <div id="scoreCircle" class="score-circle"></div>
    <h2 id="resultTitle"></h2>
    <p id="resultMsg" style="color:#666;margin-bottom:8px;"></p>
    <div class="score-details">
      <div class="score-detail-item">
        <div class="num correct-num" id="correctCount">0</div>
        <div class="label">答对</div>
      </div>
      <div class="score-detail-item">
        <div class="num wrong-num" id="wrongCount">0</div>
        <div class="label">答错</div>
      </div>
      <div class="score-detail-item">
        <div class="num unanswered-num" id="unansweredCount">0</div>
        <div class="label">未答</div>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-restart" onclick="startExam()">🔄 再来一次</button>
      <button class="btn-review" onclick="closeModal()">📝 查看解析</button>
    </div>
  </div>
</div>

<script>
// ========== 题库数据 ==========
const RAW_QUESTIONS = [
  // 单选题 1-80
  {
    id: 1, type: 'single',
    text: '完全退火主要适用于 (　　)。',
    options: ['高碳钢', '过共析钢', '工具钢', '亚共析钢'],
    answer: 'D'
  },
  {
    id: 2, type: 'single',
    text: '接触器分类为 (　　)。',
    options: ['交流接触器和直流接触器', '控制接触器和保护接触器', '主接触器和辅助接触器', '电压接触器和电流接触器'],
    answer: 'A'
  },
  {
    id: 3, type: 'single',
    text: '铰削铸铁等脆性材料时，可采用 (　　) 做为切削液。',
    options: ['乳化液', '煤油', '机油', '水'],
    answer: 'B'
  },
  {
    id: 4, type: 'single',
    text: '下面哪一个命令不是固定循环命令 (　　)。',
    options: ['G81', 'G84', 'G71', 'G83'],
    answer: 'C'
  },
  {
    id: 5, type: 'single',
    text: '曲面精加工，(　　) 方案最为合理。',
    options: ['球头刀环切法', '球头刀行切法', '立铣刀环切法', '立铣刀行切法'],
    answer: 'B'
  },
  {
    id: 6, type: 'single',
    text: '下列属于不定期维护检查的项目是 (　　)。',
    options: ['排屑器', '压缩空气气源压力', '液压系统的压力', '电气柜各散热通风装置'],
    answer: 'D'
  },
  {
    id: 7, type: 'single',
    text: '梯形螺纹的牙型角为 (　　)。',
    options: ['30°', '40°', '55°', '60°'],
    answer: 'A'
  },
  {
    id: 8, type: 'single',
    text: '我国新时期时代精神的核心是 (　　)。',
    options: ['爱国主义', '改革创新', '集体主义', '以人为本'],
    answer: 'B'
  },
  {

// ========== 全局状态 ==========
let questions = [];        // 当前随机排列的题目顺序
let userAnswers = {};      // {questionId: 'A'/'B'/'C'/'D'}
let marks = {};            // {questionId: true}  标记的题目
let currentIndex = 0;
let submitted = false;

// ========== 工具函数 ==========
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const KEYS = ['A', 'B', 'C', 'D'];

// ========== 开始考试 ==========
function startExam() {
  questions = shuffle(RAW_QUESTIONS);
  userAnswers = {};
  marks = {};
  currentIndex = 0;
  submitted = false;
  closeModal();
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('examScreen').classList.remove('hidden');
  document.getElementById('mobileNavBtn').classList.remove('hidden');
  buildNumGrid();
  renderQuestion(currentIndex);
}

function showStartScreen() {
  if (!submitted && Object.keys(userAnswers).length > 0) {
    if (!confirm('确定要放弃当前答题并重新开始吗？')) return;
  }
  document.getElementById('examScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
  document.getElementById('mobileNavBtn').classList.add('hidden');
  closeDrawer();
}

// ========== 构建题号面板 ==========
function buildNumGrid() {
  // 桌面侧边栏
  const grid = document.getElementById('numGrid');
  grid.innerHTML = '';
  // 手机抽屉
  const drawerGrid = document.getElementById('drawerNumGrid');
  drawerGrid.innerHTML = '';

  questions.forEach((q, i) => {
    // 桌面
    const btn = document.createElement('button');
    btn.className = 'num-btn';
    btn.id = `num-${i}`;
    btn.textContent = i + 1;
    btn.onclick = () => goToQuestion(i);
    grid.appendChild(btn);
    // 手机抽屉
    const btn2 = document.createElement('button');
    btn2.className = 'num-btn';
    btn2.id = `dnum-${i}`;
    btn2.textContent = i + 1;
    btn2.onclick = () => { goToQuestion(i); closeDrawer(); };
    drawerGrid.appendChild(btn2);
  });
  updateNumGrid();
}

function updateNumGrid() {
  questions.forEach((q, i) => {
    // 同时更新桌面和手机抽屉的题号按钮
    [document.getElementById(`num-${i}`), document.getElementById(`dnum-${i}`)].forEach(btn => {
      if (!btn) return;
      btn.className = 'num-btn';
      const existingDot = btn.querySelector('.mark-dot');
      if (existingDot) existingDot.remove();

      if (submitted) {
        const answered = userAnswers[q.id] !== undefined;
        if (!answered) {
          // 未答，保持默认
        } else if (userAnswers[q.id] === q.answer) {
          btn.classList.add('correct');
        } else {
          btn.classList.add('wrong');
        }
      } else {
        if (userAnswers[q.id]) btn.classList.add('answered');
      }
      if (i === currentIndex) btn.classList.add('active');
      if (marks[q.id]) {
        const dot = document.createElement('span');
        dot.className = 'mark-dot';
        btn.appendChild(dot);
      }
    });
  });
  updateProgress();
}

function updateProgress() {
  const answered = Object.keys(userAnswers).length;
  const total = questions.length;
  const pct = total ? Math.round(answered / total * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${answered} / ${total}`;
  document.getElementById('headerProgress').textContent = `已答 ${answered}/${total}`;
  // 同步抽屉进度条
  const dp = document.getElementById('drawerProgressBar');
  const dt = document.getElementById('drawerProgressText');
  if (dp) dp.style.width = pct + '%';
  if (dt) dt.textContent = `${answered} / ${total}`;
}

// ========== 渲染题目 ==========
function renderQuestion(idx) {
  currentIndex = idx;
  const q = questions[idx];
  const card = document.getElementById('questionCard');
  const isAnswered = userAnswers[q.id] !== undefined;
  const isMarked = marks[q.id] || false;

  const typeLabel = q.type === 'single' ? '单选题' : '判断题';
  const typeCls = q.type === 'single' ? 'badge-single' : 'badge-judge';

  let optionsHtml = '';
  if (q.type === 'single' || q.type === 'judge') {
    q.options.forEach((opt, i) => {
      const key = KEYS[i];
      let cls = 'option-item';
      const isSelected = userAnswers[q.id] === key;
      if (submitted) {
        if (key === q.answer) cls += ' correct-ans';
        else if (isSelected) cls += ' wrong-ans';
      } else {
        if (isSelected) cls += ' selected';
      }
      optionsHtml += `
        <div class="${cls}" data-key="${key}" onclick="${submitted ? '' : 'selectAnswer(this.dataset.key)'}">
          <div class="opt-key">${key}</div>
          <div class="opt-text">${opt}</div>
        </div>`;
    });
  }

  // 答案解析（提交后显示）
  let reviewHtml = '';
  if (submitted) {
    const myAns = userAnswers[q.id];
    const myAnsText = myAns ? `${myAns}、${q.options[KEYS.indexOf(myAns)]}` : '未作答';
    const stdAnsText = `${q.answer}、${q.options[KEYS.indexOf(q.answer)]}`;
    const isRight = myAns === q.answer;
    reviewHtml = `
      <div class="answer-review show">
        <div class="answer-icon">${isRight ? '✅' : '❌'}</div>
        <h4>答题解析</h4>
        <div class="my-answer">我的答案：<strong style="color:${isRight ? '#2e7d32' : '#c62828'}">${myAnsText}</strong></div>
        <div class="std-answer">标准答案：${stdAnsText}</div>
      </div>`;
  }

  card.innerHTML = `
    <div class="q-header">
      <div style="flex:1;margin-right:12px">
        <div class="q-num">第 ${idx + 1} 题 / 共 ${questions.length} 题（原题号：第 ${q.id} 题）</div>
        <div class="q-text">${q.text}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end">
        <span class="q-type-badge ${typeCls}">${typeLabel}</span>
        <button class="mark-btn ${isMarked ? 'marked' : ''}" onclick="toggleMark()" id="markBtn">
          ${isMarked ? '⭐ 已标记' : '☆ 标记'}
        </button>
      </div>
    </div>
    <div class="options" id="optionsContainer">
      ${optionsHtml}
    </div>
    ${reviewHtml}
    <div class="nav-btns">
      <button class="btn-nav" onclick="prevQuestion()" ${idx === 0 ? 'disabled' : ''}>← 上一题</button>
      <span class="q-progress">${idx + 1} / ${questions.length}</span>
      <button class="btn-nav" onclick="nextQuestion()" ${idx === questions.length - 1 ? 'disabled' : ''}>下一题 →</button>
    </div>
  `;
  updateNumGrid();
  // 滚动到顶部
  document.getElementById('contentArea').scrollTo({ top: 0, behavior: 'smooth' });
}

// ========== 答题 ==========
function selectAnswer(key) {
  if (submitted) return;
  const q = questions[currentIndex];
  userAnswers[q.id] = key;
  renderQuestion(currentIndex);
}

function toggleMark() {
  const q = questions[currentIndex];
  marks[q.id] = !marks[q.id];
  renderQuestion(currentIndex);
}

// ========== 导航 ==========
function goToQuestion(idx) {
  renderQuestion(idx);
}

function prevQuestion() {
  if (currentIndex > 0) renderQuestion(currentIndex - 1);
}

function nextQuestion() {
  if (currentIndex < questions.length - 1) renderQuestion(currentIndex + 1);
}

// ========== 提交 ==========
function confirmSubmit() {
  const unanswered = questions.filter(q => userAnswers[q.id] === undefined).length;
  if (unanswered > 0) {
    if (!confirm(`还有 ${unanswered} 道题未作答，确定提交吗？`)) return;
  } else {
    if (!confirm('确定提交考试吗？提交后无法修改答案。')) return;
  }
  submitExam();
}

function submitExam() {
  submitted = true;
  let correct = 0, wrong = 0, unanswered = 0;
  questions.forEach(q => {
    const ans = userAnswers[q.id];
    if (!ans) unanswered++;
    else if (ans === q.answer) correct++;
    else wrong++;
  });
  const score = correct;
  const pass = score >= 60;

  document.getElementById('correctCount').textContent = correct;
  document.getElementById('wrongCount').textContent = wrong;
  document.getElementById('unansweredCount').textContent = unanswered;

  const circle = document.getElementById('scoreCircle');
  circle.className = `score-circle ${pass ? 'pass' : 'fail'}`;
  circle.innerHTML = `${score}<span class="score-label">分</span>`;

  document.getElementById('resultTitle').textContent = pass ? '🎉 恭喜通过！' : '😔 未能通过';
  document.getElementById('resultMsg').textContent = pass
    ? `得分 ${score} 分，合格线为60分，继续保持！`
    : `得分 ${score} 分，还差 ${60 - score} 分达到合格线，继续加油！`;

  document.getElementById('resultModal').classList.add('show');
  updateNumGrid();
}

function closeModal() {
  document.getElementById('resultModal').classList.remove('show');
  if (submitted) renderQuestion(currentIndex);
}

// ========== 手机端抽屉 ==========
function openDrawer() {
  document.getElementById('sidebarDrawer').classList.add('show');
  document.getElementById('drawerOverlay').classList.add('show');
}
function closeDrawer() {
  document.getElementById('sidebarDrawer').classList.remove('show');
  document.getElementById('drawerOverlay').classList.remove('show');
}
</script>
